<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Portfolio</title>

  <!-- 字體 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#ece58d;
      overflow-x:hidden;
      font-family:'Cormorant Garamond', serif;
      color:#111;
    }

    /* 上方導覽列 */
    nav{
      width:100%;
      padding:18px 30px;
      border-bottom:1px solid #222;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:14px;
      letter-spacing:1px;
    }

    nav .center{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
    }

    /* 主視覺 */
    .hero{
      position:relative;
      min-height:100vh;
      padding:60px 40px;
    }

    .big-text{
      font-size:10vw;
      line-height:0.9;
      font-weight:300;
      z-index:2;
      position:relative;
    }

    /* 照片區 */
    .photo-box{
      position:absolute;
      right:8%;
      bottom:10%;
      width:320px;
      height:420px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
    }

    .photo-box img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* 按鈕 */
    .btn{
      position:absolute;
      left:50px;
      bottom:80px;

      display:inline-block;
      padding:14px 30px;
      border:1px solid #111;
      color:#111;
      text-decoration:none;
      font-size:18px;
      transition:0.3s;
      background:transparent;
    }

    .btn:hover{
      background:#111;
      color:#ece58d;
    }

    /* 小圓圈裝飾 */
    .circle{
      position:absolute;
      width:30px;
      height:30px;
      border:1px solid #111;
      border-radius:50%;
    }

    .circle.one{
      top:55%;
      left:12%;
    }

    .circle.two{
      top:40%;
      right:18%;
      width:24px;
      height:24px;
    }

    /* 手機版 */
    @media(max-width:768px){

      .hero{
        padding:40px 20px 120px;
      }

      .big-text{
        font-size:18vw;
      }

      .photo-box{
        position:relative;
        width:100%;
        height:420px;
        right:auto;
        bottom:auto;
        margin-top:40px;
      }

      .btn{
        position:relative;
        left:auto;
        bottom:auto;
        margin-top:30px;
      }
    }
  </style>
</head>

<body>

  <!-- 導覽列 -->
  <nav>
    <div>portfolio</div>
    <div class="center">Amy</div>
    <div>2026</div>
  </nav>

  <!-- 主畫面 -->
  <section class="hero">

    <div class="big-text">
      Amy<br>
      Digital<br>
      Designer
    </div>

    <!-- 裝飾 -->
    <div class="circle one"></div>
    <div class="circle two"></div>

    <!-- 個人照片 -->
    <div class="photo-box">
      <img src="me.jpg" alt="my photo">
    </div>

    <!-- PDF作品 -->
    <a class="btn" href="work.pdf" target="_blank">
      VIEW WORK
    </a>

  </section>

</body>
</html>
