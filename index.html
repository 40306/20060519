<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Personal Website</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins', sans-serif;

      /* 藍色漸層背景 */
      background:linear-gradient(
        135deg,
        #dfefff 0%,
        #d6e8ff 40%,
        #edf6ff 100%
      );

      overflow-x:hidden;
      color:#222;
      min-height:100vh;
      position:relative;
    }

    /* 背景模糊色塊 */

    .blur{
      position:absolute;
      border-radius:50%;
      filter:blur(90px);
      opacity:0.75;
      z-index:-1;
    }

    .blur1{
      width:320px;
      height:320px;
      background:#6ec6ff;
      top:80px;
      left:-80px;
    }

    .blur2{
      width:280px;
      height:280px;
      background:#4fc3f7;
      bottom:40px;
      left:220px;
    }

    .blur3{
      width:260px;
      height:260px;
      background:#90caf9;
      top:-40px;
      left:520px;
    }

    /* Header */

    header{
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:30px 60px;
    }

    .logo{
      font-size:14px;
      letter-spacing:3px;
      font-weight:600;
    }

    nav a{
      text-decoration:none;
      color:#111;
      font-size:14px;
      font-weight:500;
      letter-spacing:1px;
    }

    /* 主內容 */

    .container{
      min-height:calc(100vh - 100px);

      display:flex;
      justify-content:center;
      align-items:center;

      gap:100px;

      padding:40px 60px 80px;

      flex-wrap:wrap;
    }

    /* 左側照片 */

    .photo-box img{
      width:420px;
      max-width:90vw;

      border-radius:28px;

      object-fit:cover;

      box-shadow:
        0 20px 40px rgba(0,0,0,0.12),
        0 0 30px rgba(255,255,255,0.4);
    }

    /* 右側內容 */

    .content{
      max-width:520px;
    }

    .content h1{
      font-family:'Cormorant Garamond', serif;

      font-size:76px;
      line-height:0.95;

      margin-bottom:24px;

      font-weight:700;
    }

    .content p{
      font-size:20px;
      line-height:1.8;

      margin-bottom:40px;

      color:#333;
    }

    /* 按鈕 */

    .buttons{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .btn{
      height:60px;

      display:flex;
      justify-content:center;
      align-items:center;

      border-radius:16px;

      text-decoration:none;

      background:rgba(255,255,255,0.7);

      backdrop-filter:blur(10px);

      border:1px solid rgba(255,255,255,0.5);

      color:#111;

      font-weight:600;

      letter-spacing:1px;

      transition:0.3s;
    }

    .btn:hover{
      transform:translateY(-3px);

      background:#111;
      color:white;

      box-shadow:0 12px 24px rgba(0,0,0,0.18);
    }

    /* 社群 */

    .social{
      margin-top:40px;

      display:flex;
      gap:18px;
    }

    .social a{
      text-decoration:none;

      color:#111;

      font-weight:600;

      transition:0.2s;
    }

    .social a:hover{
      transform:scale(1.15);
    }

    /* RWD */

    @media(max-width:900px){

      header{
        padding:24px;
      }

      .container{
        gap:50px;
        padding:20px 24px 60px;
      }

      .content{
        text-align:center;
      }

      .content h1{
        font-size:54px;
      }

      .content p{
        font-size:18px;
      }

      .social{
        justify-content:center;
      }
    }

  </style>
</head>

<body>

  <!-- 模糊背景 -->

  <div class="blur blur1"></div>
  <div class="blur blur2"></div>
  <div class="blur blur3"></div>

  <!-- Header -->

  <header>

    <div class="logo">
      YOUR NAME | PORTFOLIO
    </div>

    <nav>
      <a href="#">HOME</a>
    </nav>

  </header>

  <!-- 主內容 -->

  <section class="container">

    <!-- 左側照片 -->

    <div class="photo-box">
      <img src="me.jpg" alt="My Photo">
    </div>

    <!-- 右側 -->

    <div class="content">

      <h1>
        Hi,<br>
        I'm Your Name.
      </h1>

      <p>
        Designer．Developer．Creator<br>
        Welcome to my personal website.
      </p>

      <div class="buttons">

        <!-- PDF作品 -->

        <a class="btn" href="work.pdf" target="_blank">
          VIEW MY WORK
        </a>

        <!-- Email -->

        <a class="btn" href="mailto:your@email.com">
          CONTACT ME
        </a>

      </div>

      <!-- 社群 -->

      <div class="social">

        <a href="#">IG</a>
        <a href="#">FB</a>
        <a href="#">YT</a>
        <a href="#">X</a>

      </div>

    </div>

  </section>

</body>
</html>
