<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的個人網站</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
      color:#333;
      text-align:center;
      padding:40px 20px;
    }

    .container{
      max-width:700px;
      margin:auto;
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    img{
      width:180px;
      height:180px;
      object-fit:cover;
      border-radius:50%;
      margin-bottom:20px;
      border:5px solid #ddd;
    }

    h1{
      margin-bottom:10px;
      font-size:36px;
    }

    p{
      margin-bottom:25px;
      line-height:1.6;
    }

    .btn{
      display:inline-block;
      padding:12px 24px;
      background:#4a90e2;
      color:white;
      text-decoration:none;
      border-radius:10px;
      transition:0.3s;
    }

    .btn:hover{
      background:#357abd;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- 個人照片 -->
    <img src="me.jpg" alt="我的照片">

    <!-- 個人介紹 -->
    <h1>你的名字</h1>

    <p>
      嗨！我是 Amy。<br>
      這是我的個人網站，歡迎來看看我的作品！
    </p>

    <!-- 作品 PDF -->
    <a class="btn" href="work.pdf" target="_blank">
      查看我的作品
    </a>

  </div>

</body>
</html>
